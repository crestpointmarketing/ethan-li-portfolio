<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Head top -->
  <rect x="14" y="2" width="10" height="2" fill="#39FF14"/>
  <!-- Head -->
  <rect x="12" y="4" width="14" height="4" fill="#39FF14"/>
  <!-- Eye -->
  <rect x="20" y="4" width="2" height="2" fill="#003a00"/>
  <!-- Snout -->
  <rect x="24" y="6" width="4" height="2" fill="#39FF14"/>
  <!-- Lower jaw -->
  <rect x="12" y="8" width="8" height="2" fill="#39FF14"/>
  <!-- Neck -->
  <rect x="10" y="8" width="4" height="4" fill="#39FF14"/>
  <!-- Body -->
  <rect x="6" y="12" width="14" height="8" fill="#39FF14"/>
  <!-- Tail -->
  <rect x="2" y="18" width="6" height="2" fill="#39FF14"/>
  <rect x="0" y="20" width="3" height="2" fill="#39FF14"/>
  <!-- Arm -->
  <rect x="18" y="18" width="4" height="2" fill="#39FF14"/>
  <!-- Legs -->
  <rect x="8"  y="20" width="4" height="8" fill="#39FF14"/>
  <rect x="14" y="20" width="4" height="8" fill="#39FF14"/>
  <!-- Feet -->
  <rect x="6"  y="28" width="6" height="2" fill="#39FF14"/>
  <rect x="12" y="28" width="6" height="2" fill="#39FF14"/>
</svg>
